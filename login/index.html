<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="flipcard.js"></script>
    <title>Lost&Found</title>
</head>

<body class="mainbody">
    <nav class="navbar navbar-expand-lg" id="menu">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><img src="/logo.svg" width="110px" alt="Lost&Found"></a>
        </div>
    </nav>

    <div class="login-page">
    <div class="login-card-wrapper" id="loginFlip">

        <!-- Bejelentkezés -->
        <div class="login-card login-front">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1>Bejelentkezés</h1>
            </div>

            <form>
                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" placeholder="Felhasználónév" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" placeholder="Jelszó" required>
                    </div>
                </div>

                <button type="submit" class="btn login-button">
                    <i class="fas fa-sign-in-alt"></i>
                    Bejelentkezés
                </button>

                <div class="register-section">
                    <p>Nincs fiókod?
                        <a href="#" onclick="flipLogin(event)">Regisztrálj</a>
                    </p>
                </div>
            </form>
        </div>

        <!-- Regisztráció -->
        <div class="login-card login-back">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Regisztráció</h1>
            </div>

            <form>
                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" placeholder="Felhasználónév" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-input" placeholder="Email" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" placeholder="Jelszó" required>
                    </div>
                </div>

                <button type="submit" class="btn login-button">
                    Regisztráció
                </button>

                <div class="register-section">
                    <p>Már van fiókod?
                        <a href="#" onclick="flipLogin(event)">Bejelentkezés</a>
                    </p>
                </div>
            </form>
        </div>

    </div>
</div>

</body>

</html>
