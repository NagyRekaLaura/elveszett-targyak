{% extends "base.html" %}
{% block title %}Bejelentkezés{% endblock %}
{% block search %}style="visibility: hidden;"{% endblock %}

{% block content %}
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1>Bejelentkezés</h1>
            </div>

            <form class="login-form" method="post" action="{{ url_for('login') }}">
                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" placeholder="Felhasználónév" required name="username">
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" placeholder="Jelszó" minlength="3" required name="password">
                    </div>
                </div>

                <button type="submit" class="btn login-button">
                    <i class="fas fa-sign-in-alt"></i>
                    Bejelentkezés
                </button>

                <div class="register-section">
                    <p>Nincs fiókod? <a href="/register">Regisztrálj itt</a></p>
                </div>
            </form>
        </div>
    </div>


    {% endblock %}
