

<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="/script.js"></script>
    <title>Lost&Found | {% block title %}{% endblock %}</title>
</head>

<body class="mainbody"> 
    <nav class="navbar navbar-expand-lg" id="menu">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='logo.svg') }}" width="110px" alt=""></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <form class="d-flex" role="search" {% block search %}{% endblock %} >
                <input class="form-control me-2 search" type="search" placeholder="&#x1F50D  Keresés"aria-label="Search"/>
            </form>


        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav" id="login">
                <li class="nav-item">
                    <a class="btn" href="{{ url_for('login') }}">Bejelentkezés/Regisztráció</a>
                </li>
            </ul>
        </div>

    </nav>

    {% block content %}
    {% endblock %}

        <footer class="main-footer">
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="footer-brand">
                    <span>Lost&Found</span>
                </div>
                <p class="footer-description">Segítünk megtalálni.</p>
            </div>
            <div class="col-md-4">
                <h5>Gyorslinkek</h5>
                <ul class="footer-links">
                    <li><a href="#"><i class="fas fa-chevron-right me-2"></i>Kezdőlap</a></li>
                    <li><a href="#"><i class="fas fa-chevron-right me-2"></i>Posztolás</a></li>
                    <li><a href="#"><i class="fas fa-chevron-right me-2"></i>Általános Szerződési Feltételek</a></li>
                    <li><a href="#"><i class="fas fa-chevron-right me-2"></i>Adatvédelmi nyilatkozat</a></li>
                </ul>
            </div>
            <div class="col-md-4">
                <h5>Kapcsolat</h5>
                <ul class="footer-contact">
                    <li><i class="fas fa-envelope me-2"></i>info@lostandfound.hu</li>
                    <li><i class="fas fa-phone me-2"></i>+36 1 234 5678</li>
                </ul>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Lost&Found. Minden jog fenntartva.</p>
        </div>
    </div>
</footer>
</body>

</html>
