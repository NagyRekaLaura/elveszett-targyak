{% extends "base.html" %}
{% block title %}Jelszó Alaphelyzetbe Állítása{% endblock %}
{% block search %}style="visibility: hidden;"{% endblock %}
{% block js %}
<script src="{{ url_for('static', filename='js/reset_password.js') }}"></script>
{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-key"></i>
                </div>
                <h1 data-i18n="resetPassword.title">Jelszó Megváltoztatása</h1>
            </div>

            <form id="resetPasswordForm" action="{{ url_for('auth.reset_password') }}" method="post">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group text-center mb-4">
                    <p data-i18n="resetPassword.description">Adja meg az új jelszavát</p>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="newPassword" name="new_password" placeholder="Új jelszó" data-i18n-attr="placeholder:resetPassword.newPassword" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="confirmPassword" name="confirm_password" placeholder="Jelszó megerősítése" data-i18n-attr="placeholder:resetPassword.confirmPassword" required>
                    </div>
                </div>

                <div id="passwordError" class="text-danger mb-3" style="display:none;">
                    <small></small>
                </div>

                <button type="submit" class="btn login-button w-100">
                    <i class="fas fa-check-circle"></i>
                    <span data-i18n="resetPassword.submit">Jelszó frissítése</span>
                </button>

                <div class="register-section mt-3">
                    <p>
                        <a href="{{ url_for('auth.login') }}" data-i18n="resetPassword.backToLogin">Vissza a bejelentkezéshez</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
