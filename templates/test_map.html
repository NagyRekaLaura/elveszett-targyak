{% extends "base.html" %}

{% block title %}Osszes Poszt Terkep{% endblock %}

{% block js %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
    const mapElement = document.getElementById('allPostsMap');
    if (!mapElement || typeof L === 'undefined') {
        return;
    }

    const settlementsJson = document.getElementById('settlementsData')?.textContent || '[]';
    const settlements = JSON.parse(settlementsJson);
    const map = L.map('allPostsMap').setView([47.1625, 19.5033], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    if (!Array.isArray(settlements) || settlements.length === 0) {
        return;
    }

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    for (const settlement of settlements) {
        const query = `${settlement.name}, Hungary`;
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`, {
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) {
                continue;
            }

            const result = await response.json();
            if (!Array.isArray(result) || result.length === 0) {
                continue;
            }

            const lat = Number.parseFloat(result[0].lat);
            const lon = Number.parseFloat(result[0].lon);
            if (Number.isNaN(lat) || Number.isNaN(lon)) {
                continue;
            }

            L.marker([lat, lon])
                .addTo(map)
                .bindPopup(`<strong>${settlement.name}</strong><br>Posztok: ${settlement.post_count}`);
        } catch (error) {
            console.error('Geocode hiba:', settlement.name, error);
        }

        await sleep(250);
    }
});
</script>
{% endblock %}

{% block content %}
            <script id="settlementsData" type="application/json">{{ settlements|tojson }}</script>

            <div id="allPostsMap" style="width: 100%; height: 70vh; min-height: 420px; border-radius: 10px;"></div>
        
{% endblock %}
