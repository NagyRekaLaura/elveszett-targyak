{% extends "base.html" %}
{% block title %}Bejelentkezés{% endblock %}
{% block search %}style="visibility: hidden;"{% endblock %}
{% block js %}
<script src="{{ url_for('static', filename='js/flipcard.js') }}"></script>
{% endblock %}
{% block content %}
    <div class="login-page">
    <div class="login-card-wrapper" id="loginFlip">

        <!-- Bejelentkezés -->
        <div class="login-card login-front">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1>Bejelentkezés</h1>
            </div>

            <form>
                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" placeholder="Felhasználónév" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" placeholder="Jelszó" required>
                    </div>
                </div>

                <button type="submit" class="btn login-button">
                    <i class="fas fa-sign-in-alt"></i>
                    Bejelentkezés
                </button>

                <div class="register-section">
                    <p>Nincs fiókod?
                        <a href="#" onclick="flipLogin(event)">Regisztrálj</a>
                    </p>
                </div>
            </form>
        </div>

        <!-- Regisztráció -->
        <div class="login-card login-back">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Regisztráció</h1>
            </div>

            <form>
                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" placeholder="Felhasználónév" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-input" placeholder="Email" required>
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" placeholder="Jelszó" required>
                    </div>
                </div>

                <button type="submit" class="btn login-button">
                    Regisztráció
                </button>

                <div class="register-section">
                    <p>Már van fiókod?
                        <a href="#" onclick="flipLogin(event)">Bejelentkezés</a>
                    </p>
                </div>
            </form>
        </div>

    </div>
</div>


    {% endblock %}
